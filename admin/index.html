<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Z cesty admin</title>
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <main class="app">
      <section class="login-view" id="loginView">
        <form class="login-panel" id="loginForm">
          <h1>Z cesty admin</h1>
          <label>
            Heslo
            <input id="password" type="password" autocomplete="current-password" required />
          </label>
          <button type="submit">Přihlásit</button>
          <p class="message" id="loginMessage"></p>
        </form>
      </section>

      <section class="admin-view" id="adminView" hidden>
        <header class="topbar">
          <div>
            <strong>Z cesty admin</strong>
            <span id="saveState">Připraveno</span>
          </div>
          <nav>
            <a href="/">Web</a>
            <button id="logout" type="button">Odhlásit</button>
          </nav>
        </header>

        <div class="workspace">
          <aside class="sidebar">
            <div class="sidebar-head">
              <h2>Články</h2>
              <button id="newPost" type="button">Nový</button>
            </div>
            <div class="post-list" id="postList"></div>
          </aside>

          <section class="editor">
            <div class="fields">
              <label>
                Titulek
                <input id="title" type="text" />
              </label>
              <label>
                Datum
                <input id="date" type="date" />
              </label>
              <label>
                Cesta
                <input id="tags" type="text" placeholder="Tchaj-wan" />
              </label>
              <label class="wide">
                Shrnutí
                <input id="summary" type="text" />
              </label>
              <label class="wide">
                Hero obrázek
                <input id="hero" type="text" placeholder="/images/fotka.jpg" />
              </label>
            </div>

            <div class="editor-toolbar">
              <button type="button" data-prefix="# ">H1</button>
              <button type="button" data-prefix="## ">H2</button>
              <button type="button" data-prefix="### ">H3</button>
              <button type="button" id="italic">Kurzíva</button>
              <button type="button" id="link">Odkaz</button>
              <label class="photo-button">
                Vybrat fotky
                <input id="photos" type="file" accept="image/*" multiple />
              </label>
              <button id="togglePreview" type="button">Skrýt náhled</button>
              <button id="deletePost" class="danger-button" type="button">Smazat</button>
              <button id="save" type="button">Uložit</button>
            </div>

            <div class="pending" id="pendingImages" hidden></div>

            <div class="split">
              <textarea id="body" spellcheck="true"></textarea>
              <article class="preview" id="preview"></article>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>

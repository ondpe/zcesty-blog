<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="dns-prefetch" href="https://unpkg.com">
    <link rel="dns-prefetch" href="https://identity.netlify.com">
    <link rel="stylesheet" href="widgets/travel-markdown.css" />
    <title>Decap CMS</title>
    <style>
      .admin-shortcuts {
        display: flex;
        justify-content: center;
        gap: 0.75rem;
        padding: 0.75rem;
        background: #f7f4ef;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .admin-shortcuts a {
        color: #0b6b5c;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <nav class="admin-shortcuts" aria-label="Admin nástroje">
      <a href="photo-prep.html">Fotky pro blog</a>
    </nav>
    <!-- Include the script that builds the page and powers Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script src="widgets/travel-markdown.js"></script>
    <!-- Include Netlify Identity for authentication -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script type="module" src="/admin/preview-templates/index.js"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          } else {
            window.netlifyIdentity.on("logout", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
  </body>
</html>
